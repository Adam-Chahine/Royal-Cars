<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation | Royal Cars</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/order.css">
</head>

<body>

    <header>
        <div class="logo">ROYAL<span>CARS</span></div>
    </header>

    <div class="reservation-wrapper">
        <div class="hero-title">
            <h1>Complete Reservation</h1>
            <p style="color: var(--text-gray)">Finalize your luxury booking below</p>
        </div>

        <div class="order-card">
            <div class="section-header">
                <h2>Booking Details</h2>
            </div>

            <div class="vehicle-box">
                <i class="fas fa-car-side"></i>
                <div>
                    <span style="font-size: 12px; color: var(--brand-orange); font-weight: bold;">SELECTED CAR</span>
                    <h3 id="car-display-name">Loading...</h3>
                </div>
            </div>

            <form id="res-form" action="order.php" method="POST">
                <input type="hidden" id="car_name" name="car-name">

                <div class="form-grid">
                    <div class="field-group">
                        <label>Full Name</label>
                        <input type="text" name="full-name" class="input-style" placeholder="John Doe" required>
                    </div>

                    <div class="field-group">
                        <label>Email Address</label>
                        <input type="email" name="email" class="input-style" placeholder="john@example.com" required>
                    </div>

                    <div class="field-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" class="input-style" placeholder="+1..." required>
                    </div>

                    <div class="field-group">
                        <label>Physical Address</label>
                        <input type="text" name="address" class="input-style" placeholder="City, Country">
                    </div>

                    <div class="field-group full-width">
                        <div class="date-subgrid">
                            <div class="field-group">
                                <label>Pick-up Date</label>
                                <input type="date" id="p_date" name="pickup-date" class="input-style" required>
                            </div>
                            <div class="field-group">
                                <label>Return Date</label>
                                <input type="date" id="r_date" name="return-date" class="input-style" required>
                            </div>
                        </div>
                    </div>

                    <div class="field-group">
                        <label>Pick-up Location</label>
                        <select name="pickup-location" class="input-style" required>
                            <option value="Airport">Airport Terminal</option>
                            <option value="Main Office">Main Office</option>
                            <option value="Hotel Delivery">Hotel Delivery</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label>Return Location</label>
                        <select name="return-location" class="input-style">
                            <option value="Same">Same as Pick-up</option>
                            <option value="Airport">Airport Terminal</option>
                            <option value="Main Office">Main Office</option>
                        </select>
                    </div>

                    <div class="field-group full-width">
                        <label>Special Requests</label>
                        <textarea name="special-requests" class="input-style" rows="3"
                            placeholder="Additional requirements..."></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-submit">
                        Confirm My Luxury Rental
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/order.js"></script>
</body>

</html>
