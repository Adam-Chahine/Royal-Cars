<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Royal Cars</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #0c0c0c;
            /* Dark blurred car background to keep the "Auto" vibe */
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        /* 2. Error Card */
        .error-card {
            background: #161616;
            border: 1px solid #332222;
            /* Subtle red-tinted border */
            border-radius: 12px;
            padding: 50px 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        /* 3. Error Icon (Sleek Warning Circle) */
        .error-icon {
            width: 80px;
            height: 80px;
            border: 3px solid #e74c3c;
            /* Alert Red */
            color: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            margin: 0 auto 25px auto;
            /* "Glow" effect to show something is wrong */
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.2);
        }

        /* 4. Typography */
        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.05rem;
            color: #888888;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* 5. Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Primary Action: Retry (Dark/Outline) */
        .btn-retry {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #444;
        }

        .btn-retry:hover {
            background-color: #222;
            border-color: #666;
        }

        /* Secondary Action: Home (Orange) */
        .btn-home {
            background-color: #f9532d;
            /* Brand Orange */
            color: #fff;
            border: none;
        }

        .btn-home:hover {
            background-color: #d13e1e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(249, 83, 45, 0.3);
        }

        .brand {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            opacity: 0.8;
        }

        .brand span {
            color: #f9532d;
        }
    </style>
</head>

<body>

    <div class="error-card">
        <div class="brand">Royal<span>Cars</span></div>

        <div class="error-icon">!</div>

        <h1>System Interruption</h1>
        <p>We encountered an unexpected issue while processing your request. Please try again or return to the fleet
            overview.</p>

        <div class="button-group">
            <button class="btn btn-retry" onclick="window.location.reload();">Try Again</button>
            <button class="btn btn-home" onclick="window.location.href='index.html';">Back to Home</button>
        </div>
    </div>

</body>

</html>
